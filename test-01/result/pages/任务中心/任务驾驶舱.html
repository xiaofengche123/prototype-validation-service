<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../../assets/app.css">
<link rel="stylesheet" href="../../assets/theme.css">
<title>任务驾驶舱</title>
<style>
  /* 6 列统计卡 —— 历史原型使用 grid 而非 flex，强制 6 列均分 */
  .stat-row-6 {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 12px;
    margin-bottom: 12px;
  }
  .stat-row-6 .stat-card.rich {
    padding: 16px;
  }
  /* 趋势图柱状条 */
  .trend-bar-group {
    display: flex;
    align-items: flex-end;
    justify-content: space-around;
    height: 160px;
    gap: 8px;
  }
  .trend-bar-item {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }
  .trend-bar {
    width: 100%;
    border-radius: 3px 3px 0 0;
    background: var(--primary-light);
    transition: height .3s;
  }
  .trend-bar.highlight {
    background: var(--primary);
  }
  .trend-bar-label {
    font-size: 11px;
    color: var(--text3);
  }
  /* 预警标签-黄色（theme.css 未提供） */
  .tag.warn-yellow {
    background: #fffde7;
    color: #f57f17;
  }
</style>
</head>
<body class="page-body">
<!--
  编码：RWGL05    名称：任务驾驶舱    类型：数据看板页
  核心内容：6个统计卡片 + 任务趋势图 + 状态分布图 + 部门排名表 + 超期预警表
  跳转：进入任务列表 → RWGL02
-->
<div id="page-content" data-page="RWGL05" class="prototype-page">

  <!-- 页头 -->
  <div class="page-header">
    <div class="page-title">任务驾驶舱</div>
    <div class="actions">
      <button class="btn btn-primary" data-nav="RWGL02">进入任务列表</button>
    </div>
  </div>

  <!-- 统计卡片（6列） -->
  <div class="stat-row-6">
    <div class="stat-card rich">
      <span class="ico ico-blue">&#128203;</span>
      <div class="stat-info">
        <div class="num">186</div>
        <div class="label">任务总数</div>
        <span class="trend trend-up">&#8593; 较上月 +12</span>
      </div>
    </div>
    <div class="stat-card rich">
      <span class="ico ico-orange">&#128227;</span>
      <div class="stat-info">
        <div class="num">23</div>
        <div class="label">待派发</div>
        <span class="trend trend-flat">占比 12.4%</span>
      </div>
    </div>
    <div class="stat-card rich">
      <span class="ico ico-purple">&#128295;</span>
      <div class="stat-info">
        <div class="num">89</div>
        <div class="label">处理中</div>
        <span class="trend trend-flat">占比 47.8%</span>
      </div>
    </div>
    <div class="stat-card rich">
      <span class="ico ico-green">&#9989;</span>
      <div class="stat-info">
        <div class="num">52</div>
        <div class="label">待验收</div>
        <span class="trend trend-flat">占比 28.0%</span>
      </div>
    </div>
    <div class="stat-card rich">
      <span class="ico ico-gray">&#128451;</span>
      <div class="stat-info">
        <div class="num">22</div>
        <div class="label">已办结</div>
        <span class="trend trend-down">&#8595; 较上月 -5</span>
      </div>
    </div>
    <div class="stat-card rich">
      <span class="ico ico-red">&#9888;</span>
      <div class="stat-info">
        <div class="num">8</div>
        <div class="label">超期任务</div>
        <span class="trend trend-up">&#8593; 较上周 +3</span>
      </div>
    </div>
  </div>

  <!-- 图表行：任务趋势 + 状态分布 -->
  <div class="two-col-grid">
    <div class="card prototype-card card-shrink">
      <div class="card-head prototype-card-head">
        <div class="title"><span class="bar"></span>任务趋势（近6个月）</div>
      </div>
      <div class="chart-wrap">
        <div class="trend-bar-group">
          <div class="trend-bar-item">
            <div class="trend-bar" style="height:60%;"></div>
            <span class="trend-bar-label">7月</span>
          </div>
          <div class="trend-bar-item">
            <div class="trend-bar" style="height:45%;"></div>
            <span class="trend-bar-label">8月</span>
          </div>
          <div class="trend-bar-item">
            <div class="trend-bar" style="height:80%;"></div>
            <span class="trend-bar-label">9月</span>
          </div>
          <div class="trend-bar-item">
            <div class="trend-bar highlight" style="height:100%;"></div>
            <span class="trend-bar-label">10月</span>
          </div>
          <div class="trend-bar-item">
            <div class="trend-bar" style="height:75%;"></div>
            <span class="trend-bar-label">11月</span>
          </div>
          <div class="trend-bar-item">
            <div class="trend-bar" style="height:55%;"></div>
            <span class="trend-bar-label">12月</span>
          </div>
        </div>
      </div>
    </div>

    <div class="card prototype-card card-shrink">
      <div class="card-head prototype-card-head">
        <div class="title"><span class="bar"></span>任务状态分布</div>
      </div>
      <div class="chart-wrap">
        <div class="pie-wrap">
          <div class="pie" style="background:conic-gradient(var(--warning) 0% 12%, var(--info) 12% 60%, var(--success) 60% 88%, var(--text3) 88% 100%);">
            <div class="pie-hole">186</div>
          </div>
          <div class="pie-legend">
            <div class="pie-legend-item"><span class="pie-legend-dot" style="background:var(--warning);"></span><span>待派发 12.4%</span></div>
            <div class="pie-legend-item"><span class="pie-legend-dot" style="background:var(--info);"></span><span>处理中 47.8%</span></div>
            <div class="pie-legend-item"><span class="pie-legend-dot" style="background:var(--success);"></span><span>待验收 28.0%</span></div>
            <div class="pie-legend-item"><span class="pie-legend-dot" style="background:var(--text3);"></span><span>已办结 11.8%</span></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- 底部双栏：部门排名 + 超期预警 -->
  <div class="two-col-grid">
    <div class="card prototype-card card-shrink">
      <div class="card-head prototype-card-head">
        <div class="title"><span class="bar"></span>部门任务处理排名（本月）</div>
      </div>
      <div class="table-wrap prototype-table-wrap panel-padding">
        <table>
          <thead>
            <tr>
              <th style="width:50px;">排名</th>
              <th>部门</th>
              <th>任务数</th>
              <th>已办结</th>
              <th>超期率</th>
              <th style="width:120px;">完成进度</th>
            </tr>
          </thead>
          <tbody id="rankBody"></tbody>
        </table>
      </div>
    </div>

    <div class="card prototype-card card-shrink">
      <div class="card-head prototype-card-head">
        <div class="title"><span class="bar"></span>超期任务预警</div>
      </div>
      <div class="table-wrap prototype-table-wrap panel-padding">
        <table>
          <thead>
            <tr>
              <th>任务编号</th>
              <th>任务标题</th>
              <th>负责人</th>
              <th>截止日</th>
              <th>超期天数</th>
              <th>预警等级</th>
            </tr>
          </thead>
          <tbody id="warnBody"></tbody>
        </table>
      </div>
    </div>
  </div>

</div>

<script src="../../assets/page-runtime.js"></script>
<script>
var RANK_DATA = [
  { rank: 1, dept: '采购部', count: 45, done: 38, overdue: '2.1%', overdueColor: 'text-success', progress: 84, barColor: 'blue' },
  { rank: 2, dept: '财务部', count: 32, done: 24, overdue: '6.3%', overdueColor: 'text-warning', progress: 75, barColor: 'blue' },
  { rank: 3, dept: '质量管理部', count: 28, done: 19, overdue: '3.6%', overdueColor: 'text-success', progress: 68, barColor: 'blue' },
  { rank: 4, dept: '法务部', count: 18, done: 11, overdue: '11.1%', overdueColor: 'text-danger', progress: 61, barColor: 'orange' },
  { rank: 5, dept: '仓储部', count: 15, done: 8, overdue: '13.3%', overdueColor: 'text-danger', progress: 53, barColor: 'red' }
];

var WARN_DATA = [
  { code: 'RW20241101005', title: '围标串标专项核查', owner: '王建国', deadline: '2024-11-30', days: '+5天', daysColor: 'var(--danger)', level: '红色', tagCls: 'reject' },
  { code: 'RW20241108012', title: '供应商关联关系排查', owner: '李晓明', deadline: '2024-12-01', days: '+4天', daysColor: 'var(--danger)', level: '红色', tagCls: 'reject' },
  { code: 'RW20241115008', title: '价格异常核查-铝锭采购', owner: '张丽娟', deadline: '2024-12-03', days: '+2天', daysColor: 'var(--warning)', level: '橙色', tagCls: 'check' },
  { code: 'RW20241120003', title: '合同变更合规检查', owner: '赵志强', deadline: '2024-12-05', days: '今日到期', daysColor: 'var(--warning)', level: '黄色', tagCls: 'warn-yellow' },
  { code: 'RW20241125006', title: '质检数据造假核查', owner: '刘婷婷', deadline: '2024-12-06', days: '即将到期', daysColor: 'var(--warning)', level: '黄色', tagCls: 'warn-yellow' }
];

var BAR_COLORS = { blue: 'var(--primary)', orange: 'var(--warning)', red: 'var(--danger)' };

function render() {
  document.getElementById('rankBody').innerHTML = RANK_DATA.map(function (d) {
    return '<tr>' +
      '<td><span class="rank-num ' + (d.rank <= 3 ? 'top' : '') + '">' + d.rank + '</span></td>' +
      '<td>' + d.dept + '</td>' +
      '<td>' + d.count + '</td>' +
      '<td>' + d.done + '</td>' +
      '<td class="' + d.overdueColor + '">' + d.overdue + '</td>' +
      '<td><div class="progress-track"><div class="progress-fill" style="width:' + d.progress + '%;background:' + BAR_COLORS[d.barColor] + ';"></div></div></td>' +
      '</tr>';
  }).join('');

  document.getElementById('warnBody').innerHTML = WARN_DATA.map(function (d) {
    return '<tr>' +
      '<td>' + d.code + '</td>' +
      '<td class="text-left">' + d.title + '</td>' +
      '<td>' + d.owner + '</td>' +
      '<td>' + d.deadline + '</td>' +
      '<td style="color:' + d.daysColor + ';font-weight:bold;">' + d.days + '</td>' +
      '<td><span class="tag ' + d.tagCls + '">' + d.level + '</span></td>' +
      '</tr>';
  }).join('');

  PR.bindActions();
}

render();
</script>
</body>
</html>
