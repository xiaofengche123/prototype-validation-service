<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>任务管理列表</title>
<link rel="stylesheet" href="../../assets/app.css">
</head>
<body class="page-body">
<div id="page-content" class="prototype-page" data-page="RWGL01">

  <!-- 页面标题 -->
  <div class="page-header">
    <div class="page-title">任务管理列表</div>
    <div class="page-sub">任务中心 · 任务查询与批量处理</div>
  </div>

  <!-- 查询条件区 -->
  <div class="card">
    <div class="card-head">
      <div class="title"><span class="bar"></span>查询条件</div>
      <div class="actions">
        <button class="btn" data-action="reset">重置</button>
        <button class="btn btn-primary" data-action="search">查询</button>
      </div>
    </div>
    <div class="query-grid">
      <div class="form-item">
        <label>任务类型</label>
        <select id="qTaskType">
          <option value="">全部</option>
          <option value="risk">风险处置</option>
          <option value="rectify">整改督办</option>
          <option value="accept">验收审核</option>
          <option value="track">跟踪检查</option>
          <option value="other">其他</option>
        </select>
      </div>
      <div class="form-item">
        <label>当前状态</label>
        <select id="qStatus">
          <option value="">全部</option>
          <option value="pending">待派发</option>
          <option value="processing">处理中</option>
          <option value="review">待审核</option>
          <option value="done">已办结</option>
          <option value="overdue">已超期</option>
        </select>
      </div>
      <div class="form-item">
        <label>责任部门</label>
        <select id="qDept">
          <option value="">全部</option>
          <option value="purchase">采购管理部</option>
          <option value="quality">质量管理部</option>
          <option value="finance">财务管理部</option>
          <option value="legal">法务合规部</option>
          <option value="production">生产运营部</option>
        </select>
      </div>
      <div class="form-item">
        <label>任务编号</label>
        <input type="text" id="qTaskCode" placeholder="请输入任务编号">
      </div>
      <div class="form-item">
        <label>任务标题</label>
        <input type="text" id="qTaskTitle" placeholder="请输入任务标题">
      </div>
      <div class="form-item">
        <label>负责人</label>
        <input type="text" id="qPerson" placeholder="请输入负责人姓名">
      </div>
      <div class="form-item">
        <label>创建时间</label>
        <div class="date-range">
          <input type="date" id="qCreateFrom">
          <span class="sep">~</span>
          <input type="date" id="qCreateTo">
        </div>
      </div>
      <div class="form-item">
        <label>截止时间</label>
        <div class="date-range">
          <input type="date" id="qDeadlineFrom">
          <span class="sep">~</span>
          <input type="date" id="qDeadlineTo">
        </div>
      </div>
    </div>
  </div>

  <!-- 数据表格区 -->
  <div class="card list-card">
    <div class="list-toolbar">
      <div class="title">任务列表</div>
      <div class="actions">
        <button class="btn btn-sm" data-action="batch-export">批量导出</button>
        <button class="btn btn-sm" data-action="batch-dispatch">批量派发</button>
        <button class="btn btn-sm" data-action="batch-delete">批量删除</button>
      </div>
    </div>
    <div class="batch-bar" id="batchBar">
      <span>已选择 <b id="selCount">0</b> 项</span>
      <button class="btn btn-sm" data-action="batch-export-sel">批量导出</button>
      <button class="btn btn-sm" data-action="batch-dispatch-sel">批量派发</button>
      <button class="btn btn-sm" data-action="batch-delete-sel">批量删除</button>
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th style="width:40px;"><input type="checkbox" id="chkAll"></th>
            <th>序号</th>
            <th>任务编号</th>
            <th>任务标题</th>
            <th>任务类型</th>
            <th>关联风险</th>
            <th>负责人</th>
            <th>责任部门</th>
            <th>创建时间</th>
            <th>截止时间</th>
            <th>当前状态</th>
            <th>操作</th>
          </tr>
        </thead>
        <tbody id="taskTableBody"></tbody>
      </table>
    </div>
    <div class="pager">
      <span class="total">共 <b id="totalCount">8</b> 条</span>
      <select class="pg-size" id="pageSize">
        <option value="10">10条/页</option>
        <option value="20" selected>20条/页</option>
        <option value="50">50条/页</option>
      </select>
      <span class="pg active">1</span>
      <span class="pg">2</span>
      <span class="pg">3</span>
      <span class="goto">前往 <input type="text" value="1"> 页</span>
    </div>
  </div>

</div>

<script src="../../assets/page-runtime.js"></script>
<script>
(function() {
  var taskData = [
    { id: 1, code: 'RW202412150001', title: '供应商资质复核任务', type: '风险处置', riskCode: 'FX202412150001', person: '张三', dept: '采购管理部', createTime: '2024-12-15 09:00', deadline: '2024-12-22', status: 'processing' },
    { id: 2, code: 'RW202412140002', title: '产品质量整改督办', type: '整改督办', riskCode: 'FX202412120004', person: '李四', dept: '质量管理部', createTime: '2024-12-14 10:30', deadline: '2024-12-21', status: 'done' },
    { id: 3, code: 'RW202412130003', title: '合同条款合规审查', type: '验收审核', riskCode: 'FX202412140002', person: '王五', dept: '法务合规部', createTime: '2024-12-13 14:00', deadline: '2024-12-20', status: 'review' },
    { id: 4, code: 'RW202412120004', title: '采购成本异常核查', type: '风险处置', riskCode: 'FX202412130003', person: '赵六', dept: '财务管理部', createTime: '2024-12-12 08:30', deadline: '2024-12-19', status: 'overdue' },
    { id: 5, code: 'RW202412110005', title: '交付延期整改跟踪', type: '跟踪检查', riskCode: 'FX202412110005', person: '孙七', dept: '生产运营部', createTime: '2024-12-11 11:00', deadline: '2024-12-18', status: 'processing' },
    { id: 6, code: 'RW202412100006', title: '供应商关联关系核查', type: '风险处置', riskCode: 'FX202412100006', person: '周八', dept: '法务合规部', createTime: '2024-12-10 15:30', deadline: '2024-12-17', status: 'pending' },
    { id: 7, code: 'RW202412090007', title: '环保资质过期整改', type: '整改督办', riskCode: 'FX202412080008', person: '吴九', dept: '采购管理部', createTime: '2024-12-09 09:30', deadline: '2024-12-16', status: 'done' },
    { id: 8, code: 'RW202412080008', title: '价格异常专项调查', type: '风险处置', riskCode: 'FX202412090007', person: '郑十', dept: '财务管理部', createTime: '2024-12-08 13:00', deadline: '2024-12-15', status: 'overdue' }
  ];

  var typeMap = { risk: '风险处置', rectify: '整改督办', accept: '验收审核', track: '跟踪检查', other: '其他' };
  var statusMap = { pending: '待派发', processing: '处理中', review: '待审核', done: '已办结', overdue: '已超期' };
  var statusClass = { pending: 'pending', processing: 'review', review: 'review', done: 'pass', overdue: 'reject' };

  var selectedIds = new Set();

  function renderTable() {
    var html = taskData.map(function(r) {
      var checked = selectedIds.has(r.id) ? 'checked' : '';
      return '<tr>' +
        '<td><input type="checkbox" class="row-chk" data-id="' + r.id + '" ' + checked + '></td>' +
        '<td>' + r.id + '</td>' +
        '<td><span class="link" data-nav="RWGL01">' + r.code + '</span></td>' +
        '<td class="text-left">' + r.title + '</td>' +
        '<td>' + r.type + '</td>' +
        '<td><span class="link" data-nav="FXSJXQ01">' + r.riskCode + '</span></td>' +
        '<td>' + r.person + '</td>' +
        '<td>' + r.dept + '</td>' +
        '<td>' + r.createTime + '</td>' +
        '<td>' + r.deadline + '</td>' +
        '<td><span class="tag ' + statusClass[r.status] + '"><span class="td"></span>' + statusMap[r.status] + '</span></td>' +
        '<td>' +
          '<button class="op blue" data-action="view-detail" data-nav="RWGL01">查看</button>' +
          '<button class="op blue" data-action="edit-row">编辑</button>' +
        '</td>' +
      '</tr>';
    }).join('');
    document.getElementById('taskTableBody').innerHTML = html;
    bindRowChecks();
  }

  function bindRowChecks() {
    document.querySelectorAll('.row-chk').forEach(function(chk) {
      chk.addEventListener('change', function() {
        var id = parseInt(this.dataset.id);
        if (this.checked) selectedIds.add(id);
        else selectedIds.delete(id);
        updateBatchBar();
      });
    });
  }

  function updateBatchBar() {
    var count = selectedIds.size;
    document.getElementById('selCount').textContent = count;
    var listCard = document.querySelector('.list-card');
    if (count > 0) listCard.classList.add('has-sel');
    else listCard.classList.remove('has-sel');
  }

  document.getElementById('chkAll').addEventListener('change', function() {
    if (this.checked) {
      taskData.forEach(function(r) { selectedIds.add(r.id); });
    } else {
      selectedIds.clear();
    }
    renderTable();
    updateBatchBar();
  });

  PR.on('search', function() { PR.toast('查询完成'); renderTable(); });
  PR.on('reset', function() {
    document.getElementById('qTaskType').value = '';
    document.getElementById('qStatus').value = '';
    document.getElementById('qDept').value = '';
    document.getElementById('qTaskCode').value = '';
    document.getElementById('qTaskTitle').value = '';
    document.getElementById('qPerson').value = '';
    document.getElementById('qCreateFrom').value = '';
    document.getElementById('qCreateTo').value = '';
    document.getElementById('qDeadlineFrom').value = '';
    document.getElementById('qDeadlineTo').value = '';
    selectedIds.clear();
    updateBatchBar();
    renderTable();
    PR.toast('已重置');
  });
  PR.on('batch-export', function() { PR.toast('批量导出'); });
  PR.on('batch-dispatch', function() { PR.toast('批量派发'); });
  PR.on('batch-delete', function() { PR.toast('批量删除'); });
  PR.on('batch-export-sel', function() { PR.toast('已选 ' + selectedIds.size + ' 项，批量导出'); });
  PR.on('batch-dispatch-sel', function() { PR.toast('已选 ' + selectedIds.size + ' 项，批量派发'); });
  PR.on('batch-delete-sel', function() { PR.toast('已选 ' + selectedIds.size + ' 项，批量删除'); });
  PR.on('view-detail', function() { PR.toast('查看详情'); });
  PR.on('edit-row', function() { PR.toast('编辑'); });

  renderTable();
  PR.bindActions();
})();
</script>
</body>
</html>
