<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>统计报表 - 风险驾驶舱</title>
<link rel="stylesheet" href="../../assets/app.css">
</head>
<body class="page-body">
<div id="page-content" class="prototype-page" data-page="FXTJBB01">

  <!-- 页面标题 -->
  <div class="page-header">
    <div class="page-title">统计报表</div>
    <div class="page-sub">风险驾驶舱 · 风险数据汇总统计</div>
  </div>

  <!-- 查询条件区 -->
  <div class="card">
    <div class="card-head">
      <div class="title"><span class="bar"></span>查询条件</div>
      <div class="actions">
        <button class="btn" data-action="reset">重置</button>
        <button class="btn btn-primary" data-action="search">查询</button>
        <button class="btn btn-success" data-action="export-excel">导出 Excel</button>
      </div>
    </div>
    <div class="query-grid">
      <div class="form-item">
        <label>风险编号</label>
        <input type="text" id="qRiskCode" placeholder="请输入风险编号">
      </div>
      <div class="form-item">
        <label>风险标题</label>
        <input type="text" id="qRiskTitle" placeholder="请输入风险标题">
      </div>
      <div class="form-item">
        <label>风险等级</label>
        <select id="qLevel">
          <option value="">全部</option>
          <option value="high">高风险</option>
          <option value="mid">中风险</option>
          <option value="low">低风险</option>
        </select>
      </div>
      <div class="form-item">
        <label>当前状态</label>
        <select id="qStatus">
          <option value="">全部</option>
          <option value="pending">待处理</option>
          <option value="processing">处理中</option>
          <option value="review">待审核</option>
          <option value="closed">已关闭</option>
        </select>
      </div>
      <div class="form-item">
        <label>风险场景</label>
        <select id="qScene">
          <option value="">全部</option>
          <option value="supplier">供应商风险</option>
          <option value="contract">合同风险</option>
          <option value="price">价格风险</option>
          <option value="quality">质量风险</option>
          <option value="delivery">交付风险</option>
          <option value="finance">财务风险</option>
          <option value="compliance">合规风险</option>
        </select>
      </div>
      <div class="form-item">
        <label>风险点</label>
        <select id="qRiskPoint">
          <option value="">全部</option>
          <option value="qualification">资质异常</option>
          <option value="relation">关联关系</option>
          <option value="price">价格异常</option>
          <option value="quality">质量缺陷</option>
          <option value="delay">交付延期</option>
          <option value="contract">合同违约</option>
        </select>
      </div>
      <div class="form-item">
        <label>责任部门</label>
        <select id="qDept">
          <option value="">全部</option>
          <option value="purchase">采购管理部</option>
          <option value="quality">质量管理部</option>
          <option value="finance">财务管理部</option>
          <option value="legal">法务合规部</option>
          <option value="production">生产运营部</option>
        </select>
      </div>
      <div class="form-item">
        <label>处置责任人</label>
        <input type="text" id="qPerson" placeholder="请输入责任人姓名">
      </div>
      <div class="form-item">
        <label>发现时间</label>
        <div class="date-range">
          <input type="date" id="qDateFrom">
          <span class="sep">~</span>
          <input type="date" id="qDateTo">
        </div>
      </div>
      <div class="form-item">
        <label>涉及金额(万元)</label>
        <div class="date-range">
          <input type="text" placeholder="最小金额">
          <span class="sep">~</span>
          <input type="text" placeholder="最大金额">
        </div>
      </div>
    </div>
  </div>

  <!-- 汇总统计卡片 -->
  <div class="stat-row">
    <div class="stat-card">
      <div class="label"><span class="dot dot-primary"></span>查询结果总数</div>
      <div class="num">1,256</div>
    </div>
    <div class="stat-card">
      <div class="label"><span class="dot dot-danger"></span>高风险</div>
      <div class="num num-danger">89</div>
    </div>
    <div class="stat-card">
      <div class="label"><span class="dot dot-warning"></span>中风险</div>
      <div class="num num-warning">378</div>
    </div>
    <div class="stat-card">
      <div class="label"><span class="dot dot-muted"></span>低风险</div>
      <div class="num num-muted">789</div>
    </div>
    <div class="stat-card">
      <div class="label"><span class="dot dot-success"></span>已关闭</div>
      <div class="num num-success">642</div>
    </div>
  </div>

  <!-- 数据表格区 -->
  <div class="card list-card">
    <div class="list-toolbar">
      <div class="title">风险统计明细</div>
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>风险编号 ▼</th>
            <th>风险标题</th>
            <th>等级</th>
            <th>状态</th>
            <th>风险场景</th>
            <th>风险点</th>
            <th>责任部门</th>
            <th>处置责任人</th>
            <th>涉及金额(万元)</th>
            <th>发现时间</th>
            <th>处置完成时间</th>
          </tr>
        </thead>
        <tbody id="reportTableBody"></tbody>
      </table>
    </div>
    <div class="pager">
      <span class="total">共 <b id="totalCount">8</b> 条</span>
      <select class="pg-size" id="pageSize">
        <option value="10">10条/页</option>
        <option value="20" selected>20条/页</option>
        <option value="50">50条/页</option>
      </select>
      <span class="pg active">1</span>
      <span class="pg">2</span>
      <span class="pg">3</span>
      <span class="goto">前往 <input type="text" value="1"> 页</span>
    </div>
  </div>

</div>

<script src="../../assets/page-runtime.js"></script>
<script>
(function() {
  var reportData = [
    { code: 'FX202412150001', title: '供应商资质异常预警', level: 'mid', status: 'pending', scene: '供应商风险', point: '资质异常', dept: '采购管理部', person: '张三', amount: '128.50', discovery: '2024-12-15', complete: '-' },
    { code: 'FX202412140002', title: '合同付款条款风险', level: 'high', status: 'processing', scene: '合同风险', point: '合同违约', dept: '法务合规部', person: '李四', amount: '560.00', discovery: '2024-12-14', complete: '-' },
    { code: 'FX202412130003', title: '原材料价格波动预警', level: 'low', status: 'review', scene: '价格风险', point: '价格异常', dept: '财务管理部', person: '王五', amount: '45.20', discovery: '2024-12-13', complete: '-' },
    { code: 'FX202412120004', title: '产品质量批次异常', level: 'high', status: 'pending', scene: '质量风险', point: '质量缺陷', dept: '质量管理部', person: '赵六', amount: '320.80', discovery: '2024-12-12', complete: '-' },
    { code: 'FX202412110005', title: '交付延期风险', level: 'mid', status: 'closed', scene: '交付风险', point: '交付延期', dept: '生产运营部', person: '孙七', amount: '89.60', discovery: '2024-12-11', complete: '2024-12-14' },
    { code: 'FX202412100006', title: '供应商关联关系未披露', level: 'high', status: 'processing', scene: '合规风险', point: '关联关系', dept: '法务合规部', person: '周八', amount: '210.00', discovery: '2024-12-10', complete: '-' },
    { code: 'FX202412090007', title: '采购成本异常偏高', level: 'mid', status: 'pending', scene: '价格风险', point: '价格异常', dept: '财务管理部', person: '吴九', amount: '156.30', discovery: '2024-12-09', complete: '-' },
    { code: 'FX202412080008', title: '供应商环保资质过期', level: 'low', status: 'review', scene: '供应商风险', point: '资质异常', dept: '采购管理部', person: '郑十', amount: '32.00', discovery: '2024-12-08', complete: '-' }
  ];

  var levelClass = { high: 'level-high', mid: 'level-mid', low: 'level-low' };
  var levelMap = { high: '高风险', mid: '中风险', low: '低风险' };
  var statusMap = { pending: '待处理', processing: '处理中', review: '待审核', closed: '已关闭' };
  var statusClass = { pending: 'pending', processing: 'review', review: 'review', closed: 'pass' };

  function renderTable() {
    var html = reportData.map(function(r) {
      return '<tr>' +
        '<td><span class="link" data-nav="FXSJXQ01">' + r.code + '</span></td>' +
        '<td class="text-left">' + r.title + '</td>' +
        '<td><span class="level-tag ' + levelClass[r.level] + '">' + levelMap[r.level] + '</span></td>' +
        '<td><span class="tag ' + statusClass[r.status] + '"><span class="td"></span>' + statusMap[r.status] + '</span></td>' +
        '<td>' + r.scene + '</td>' +
        '<td>' + r.point + '</td>' +
        '<td>' + r.dept + '</td>' +
        '<td>' + r.person + '</td>' +
        '<td>' + r.amount + '</td>' +
        '<td>' + r.discovery + '</td>' +
        '<td>' + r.complete + '</td>' +
      '</tr>';
    }).join('');
    document.getElementById('reportTableBody').innerHTML = html;
  }

  PR.on('search', function() { PR.toast('查询完成'); renderTable(); });
  PR.on('reset', function() {
    document.getElementById('qRiskCode').value = '';
    document.getElementById('qRiskTitle').value = '';
    document.getElementById('qLevel').value = '';
    document.getElementById('qStatus').value = '';
    document.getElementById('qScene').value = '';
    document.getElementById('qRiskPoint').value = '';
    document.getElementById('qDept').value = '';
    document.getElementById('qPerson').value = '';
    document.getElementById('qDateFrom').value = '';
    document.getElementById('qDateTo').value = '';
    renderTable();
    PR.toast('已重置');
  });
  PR.on('export-excel', function() { PR.toast('正在导出 Excel...'); });

  renderTable();
  PR.bindActions();
})();
</script>
</body>
</html>
