<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>风险登记录入 - 绿星链通</title>
<link rel="stylesheet" href="../../assets/app.css">
</head>
<body class="page-body">
<div id="page-content" class="prototype-page has-fixed-actions" data-page="FXDJLR01">

  <!-- 页面标题 -->
  <div class="page-header">
    <div class="page-title">风险登记录入</div>
    <div class="page-sub">绿星链通 · 风险事件信息录入</div>
  </div>

  <!-- 步骤条 -->
  <div class="prototype-steps">
    <div class="prototype-step active">
      <span class="step-num">1</span>
      <span>基本信息</span>
    </div>
    <div class="prototype-step-line"></div>
    <div class="prototype-step">
      <span class="step-num">2</span>
      <span>风险定级</span>
    </div>
    <div class="prototype-step-line"></div>
    <div class="prototype-step">
      <span class="step-num">3</span>
      <span>责任分配</span>
    </div>
    <div class="prototype-step-line"></div>
    <div class="prototype-step">
      <span class="step-num">4</span>
      <span>提交确认</span>
    </div>
  </div>

  <!-- 基本信息卡片 -->
  <div class="card">
    <div class="card-head">
      <div class="title"><span class="bar"></span>基本信息</div>
    </div>
    <div class="query-grid">
      <div class="form-item">
        <label>风险编号<span class="req">*</span></label>
        <input type="text" id="riskCode" value="FX202412150009" readonly style="background:#f5f5f5;">
      </div>
      <div class="form-item">
        <label>风险标题<span class="req">*</span></label>
        <input type="text" id="riskTitle" placeholder="请输入风险标题">
      </div>
      <div class="form-item">
        <label>一级分类<span class="req">*</span></label>
        <select id="categoryL1">
          <option value="">请选择</option>
          <option value="supplier">供应商风险</option>
          <option value="contract">合同风险</option>
          <option value="price">价格风险</option>
          <option value="quality">质量风险</option>
          <option value="delivery">交付风险</option>
          <option value="finance">财务风险</option>
          <option value="compliance">合规风险</option>
        </select>
      </div>
      <div class="form-item">
        <label>二级分类<span class="req">*</span></label>
        <select id="categoryL2">
          <option value="">请先选择一级分类</option>
        </select>
      </div>
      <div class="form-item">
        <label>初评等级<span class="req">*</span></label>
        <select id="initLevel">
          <option value="">请选择</option>
          <option value="high">高风险</option>
          <option value="mid">中风险</option>
          <option value="low">低风险</option>
        </select>
      </div>
      <div class="form-item">
        <label>发现来源<span class="req">*</span></label>
        <select id="discoverySource">
          <option value="">请选择</option>
          <option value="system">系统预警</option>
          <option value="manual">人工发现</option>
          <option value="audit">审计发现</option>
          <option value="external">外部举报</option>
        </select>
      </div>
      <div class="form-item">
        <label>责任部门<span class="req">*</span></label>
        <select id="responsibleDept">
          <option value="">请选择</option>
          <option value="purchase">采购管理部</option>
          <option value="quality">质量管理部</option>
          <option value="finance">财务管理部</option>
          <option value="legal">法务合规部</option>
          <option value="production">生产运营部</option>
        </select>
      </div>
      <div class="form-item">
        <label>涉及单据号</label>
        <input type="text" id="docNo" placeholder="请输入涉及单据号">
      </div>
      <div class="form-item">
        <label>涉及供应商</label>
        <input type="text" id="supplierName" placeholder="请输入供应商名称">
      </div>
      <div class="form-item">
        <label>涉及金额(万元)<span class="req">*</span></label>
        <input type="text" id="involvedAmount" placeholder="请输入涉及金额">
      </div>
      <div class="form-item">
        <label>发现时间<span class="req">*</span></label>
        <input type="date" id="discoveryDate">
      </div>
      <div class="form-item">
        <label>登记人</label>
        <input type="text" value="潘冬妮" readonly style="background:#f5f5f5;">
      </div>
    </div>
    <div style="padding:0 16px 16px;">
      <div class="form-item field-block">
        <label>风险描述<span class="req">*</span></label>
        <textarea id="riskDesc" rows="4" placeholder="请详细描述风险事件的具体情况、触发原因及可能的影响..."></textarea>
      </div>
    </div>
  </div>

  <!-- 风险定级卡片 -->
  <div class="card">
    <div class="card-head">
      <div class="title"><span class="bar"></span>风险定级</div>
    </div>
    <div class="query-grid" style="padding:16px;">
      <div class="form-item">
        <label>影响程度<span class="req">*</span></label>
        <select id="impactDegree">
          <option value="">请选择</option>
          <option value="5">极高（5分）</option>
          <option value="4">高（4分）</option>
          <option value="3">中（3分）</option>
          <option value="2">低（2分）</option>
          <option value="1">极低（1分）</option>
        </select>
      </div>
      <div class="form-item">
        <label>发生概率<span class="req">*</span></label>
        <select id="probability">
          <option value="">请选择</option>
          <option value="5">极高（5分）</option>
          <option value="4">高（4分）</option>
          <option value="3">中（3分）</option>
          <option value="2">低（2分）</option>
          <option value="1">极低（1分）</option>
        </select>
      </div>
      <div class="form-item">
        <label>风险分值</label>
        <input type="text" id="riskScore" placeholder="自动计算" readonly style="background:#f5f5f5;">
      </div>
      <div class="form-item">
        <label>风险等级</label>
        <input type="text" id="riskLevel" placeholder="自动判定" readonly style="background:#f5f5f5;">
      </div>
    </div>
  </div>

  <!-- 固定底部操作栏 -->
  <div class="fixed-bottom-bar between">
    <button class="btn" data-action="return-list">返回列表</button>
    <div style="display:flex;gap:12px;">
      <button class="btn" data-action="save-draft" data-modal-target="draftModal">保存草稿</button>
      <button class="btn btn-primary" data-action="submit-confirm" data-modal-target="submitModal">确认提交</button>
    </div>
  </div>

  <!-- 保存草稿确认弹窗 -->
  <div class="modal-mask" id="draftModalMask" data-modal="draftModal">
    <div class="modal" style="width:420px;">
      <div class="modal-title">保存草稿</div>
      <div class="modal-body" style="display:block;padding:24px;text-align:center;">
        <p style="font-size:14px;color:var(--text);">确定保存为草稿吗？</p>
        <p style="font-size:12px;color:var(--text3);margin-top:8px;">草稿可在"我的工作台"中继续编辑。</p>
      </div>
      <div class="modal-footer">
        <button class="btn" data-action="close-modal" data-modal-target="draftModal">取消</button>
        <button class="btn btn-primary" data-action="confirm-draft" data-modal-target="draftModal">确认保存</button>
      </div>
    </div>
  </div>

  <!-- 确认提交弹窗 -->
  <div class="modal-mask" id="submitModalMask" data-modal="submitModal">
    <div class="modal" style="width:480px;">
      <div class="modal-title">确认提交</div>
      <div class="modal-body" style="display:block;padding:18px 24px;">
        <p style="font-size:13px;color:var(--text2);margin-bottom:16px;">请确认以下信息无误后提交：</p>
        <div class="info-grid" style="gap:8px 16px;">
          <div class="info-item">
            <span class="info-label">风险标题：</span>
            <span class="info-value normal" id="previewTitle">-</span>
          </div>
          <div class="info-item">
            <span class="info-label">风险分类：</span>
            <span class="info-value normal" id="previewCategory">-</span>
          </div>
          <div class="info-item">
            <span class="info-label">风险等级：</span>
            <span class="info-value normal" id="previewLevel">-</span>
          </div>
          <div class="info-item">
            <span class="info-label">涉及金额：</span>
            <span class="info-value normal" id="previewAmount">-</span>
          </div>
          <div class="info-item">
            <span class="info-label">责任部门：</span>
            <span class="info-value normal" id="previewDept">-</span>
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn" data-action="close-modal" data-modal-target="submitModal">取消</button>
        <button class="btn btn-primary" data-action="confirm-submit" data-modal-target="submitModal">确认提交</button>
      </div>
    </div>
  </div>

</div>

<script src="../../assets/page-runtime.js"></script>
<script>
(function() {
  var subCategoryMap = {
    supplier: ['资质异常', '关联关系', '履约能力', '信用风险', '环保合规'],
    contract: ['条款风险', '违约风险', '变更风险', '终止风险'],
    price: ['价格波动', '成本异常', '比价风险', '垄断风险'],
    quality: ['批次异常', '标准不符', '检测风险', '召回风险'],
    delivery: ['延期风险', '数量短缺', '运输损坏', '库存风险'],
    finance: ['付款风险', '汇率风险', '税务风险', '资金链风险'],
    compliance: ['法律合规', '政策风险', '知识产权', '数据安全']
  };

  document.getElementById('categoryL1').addEventListener('change', function() {
    var sel = document.getElementById('categoryL2');
    var val = this.value;
    sel.innerHTML = '<option value="">请选择</option>';
    if (val && subCategoryMap[val]) {
      subCategoryMap[val].forEach(function(item) {
        sel.innerHTML += '<option value="' + item + '">' + item + '</option>';
      });
    }
  });

  function calcScore() {
    var impact = parseInt(document.getElementById('impactDegree').value) || 0;
    var prob = parseInt(document.getElementById('probability').value) || 0;
    var score = impact * prob;
    document.getElementById('riskScore').value = score > 0 ? score : '';
    var level = '';
    if (score >= 16) level = '高风险';
    else if (score >= 9) level = '中风险';
    else if (score > 0) level = '低风险';
    document.getElementById('riskLevel').value = level;
  }

  document.getElementById('impactDegree').addEventListener('change', calcScore);
  document.getElementById('probability').addEventListener('change', calcScore);

  PR.on('return-list', function() { PR.toast('返回列表'); });
  PR.on('save-draft', function() { PR.openModal('draftModal'); });
  PR.on('submit-confirm', function() {
    document.getElementById('previewTitle').textContent = document.getElementById('riskTitle').value || '-';
    document.getElementById('previewCategory').textContent = document.getElementById('categoryL1').options[document.getElementById('categoryL1').selectedIndex].text || '-';
    document.getElementById('previewLevel').textContent = document.getElementById('riskLevel').value || '-';
    document.getElementById('previewAmount').textContent = (document.getElementById('involvedAmount').value || '-') + ' 万元';
    document.getElementById('previewDept').textContent = document.getElementById('responsibleDept').options[document.getElementById('responsibleDept').selectedIndex].text || '-';
    PR.openModal('submitModal');
  });
  PR.on('confirm-draft', function() { PR.closeModal('draftModal'); PR.toast('草稿已保存'); });
  PR.on('confirm-submit', function() { PR.closeModal('submitModal'); PR.toast('提交成功'); });

  PR.bindActions();
})();
</script>
</body>
</html>
