<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>风险监督场景 - 风险管理</title>
<link rel="stylesheet" href="../../assets/app.css">
</head>
<body class="page-body">
<div id="page-content" class="prototype-page" data-page="FXJDSC01">

  <!-- 页面标题 -->
  <div class="page-header">
    <div class="page-title">风险监督场景</div>
    <div class="page-sub">风险管理 · 风险场景识别与任务生成</div>
  </div>

  <!-- 统计卡片 -->
  <div class="stat-row">
    <div class="stat-card rich">
      <div class="ico ico-red">⚠️</div>
      <div class="stat-info">
        <div class="num num-danger">156</div>
        <div class="label">待处理风险</div>
      </div>
    </div>
    <div class="stat-card rich">
      <div class="ico ico-orange">🔔</div>
      <div class="stat-info">
        <div class="num num-warning">89</div>
        <div class="label">今日新增</div>
      </div>
    </div>
    <div class="stat-card rich">
      <div class="ico ico-blue">📋</div>
      <div class="stat-info">
        <div class="num">42</div>
        <div class="label">已生成任务</div>
      </div>
    </div>
    <div class="stat-card rich">
      <div class="ico ico-green">✅</div>
      <div class="stat-info">
        <div class="num num-success">1,245</div>
        <div class="label">本月已处理</div>
      </div>
    </div>
  </div>

  <!-- 查询条件区 -->
  <div class="card">
    <div class="card-head">
      <div class="title"><span class="bar"></span>查询条件</div>
      <div class="actions">
        <button class="btn btn-primary" data-action="open-add" data-modal-target="addRiskModal">+ 手动录入风险</button>
        <button class="btn" data-action="reset">重置</button>
        <button class="btn btn-primary" data-action="search">查询</button>
      </div>
    </div>
    <div class="query-grid">
      <div class="form-item">
        <label>业务场景</label>
        <select id="qScene">
          <option value="">全部</option>
          <option value="supplier">供应商准入</option>
          <option value="contract">合同签订</option>
          <option value="price">价格审批</option>
          <option value="quality">质量检验</option>
          <option value="delivery">交付验收</option>
          <option value="payment">付款结算</option>
        </select>
      </div>
      <div class="form-item">
        <label>风险点</label>
        <select id="qRiskPoint">
          <option value="">全部</option>
          <option value="qualification">资质异常</option>
          <option value="relation">关联关系</option>
          <option value="price">价格异常</option>
          <option value="quality">质量缺陷</option>
          <option value="delay">交付延期</option>
          <option value="contract">合同违约</option>
        </select>
      </div>
      <div class="form-item">
        <label>风险等级</label>
        <select id="qLevel">
          <option value="">全部</option>
          <option value="high">高风险</option>
          <option value="mid">中风险</option>
          <option value="low">低风险</option>
        </select>
      </div>
      <div class="form-item">
        <label>处理状态</label>
        <select id="qHandleStatus">
          <option value="">全部</option>
          <option value="pending">待处理</option>
          <option value="processing">处理中</option>
          <option value="generated">已生成任务</option>
          <option value="false">已标记误报</option>
          <option value="closed">已关闭</option>
        </select>
      </div>
      <div class="form-item">
        <label>供应商名称</label>
        <input type="text" id="qSupplier" placeholder="请输入供应商名称">
      </div>
      <div class="form-item">
        <label>发现时间</label>
        <div class="date-range">
          <input type="date" id="qDateFrom">
          <span class="sep">~</span>
          <input type="date" id="qDateTo">
        </div>
      </div>
      <div class="form-item">
        <label>关联单据</label>
        <input type="text" id="qDocNo" placeholder="请输入关联单据号">
      </div>
      <div class="form-item">
        <label>统一社会信用代码</label>
        <input type="text" id="qCreditCode" placeholder="请输入信用代码">
      </div>
    </div>
  </div>

  <!-- 数据表格区 -->
  <div class="card list-card">
    <div class="list-toolbar">
      <div class="title">风险场景列表</div>
      <div class="actions">
        <button class="btn btn-sm" data-action="batch-generate">批量生成任务</button>
        <button class="btn btn-sm" data-action="batch-export">批量导出</button>
      </div>
    </div>
    <div class="batch-bar" id="batchBar">
      <span>已选择 <b id="selCount">0</b> 项</span>
      <button class="btn btn-sm" data-action="batch-generate-sel">批量生成任务</button>
      <button class="btn btn-sm" data-action="batch-export-sel">批量导出</button>
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th style="width:40px;"><input type="checkbox" id="chkAll"></th>
            <th>序号</th>
            <th>业务场景</th>
            <th>风险点</th>
            <th>供应商名称</th>
            <th>统一社会信用代码</th>
            <th>风险等级</th>
            <th>触发规则</th>
            <th>关联业务单据</th>
            <th>发现时间</th>
            <th>处理状态</th>
            <th>操作</th>
          </tr>
        </thead>
        <tbody id="sceneTableBody"></tbody>
      </table>
    </div>
    <div class="pager">
      <span class="total">共 <b id="totalCount">8</b> 条</span>
      <select class="pg-size" id="pageSize">
        <option value="10">10条/页</option>
        <option value="20" selected>20条/页</option>
        <option value="50">50条/页</option>
      </select>
      <span class="pg active">1</span>
      <span class="pg">2</span>
      <span class="pg">3</span>
      <span class="goto">前往 <input type="text" value="1"> 页</span>
    </div>
  </div>

  <!-- 手动录入风险弹窗 -->
  <div class="modal-mask" id="addRiskModalMask" data-modal="addRiskModal">
    <div class="modal modal-wide">
      <div class="modal-title">手动录入风险</div>
      <div class="modal-body">
        <div class="form-item">
          <label>业务场景<span class="req">*</span></label>
          <select>
            <option value="">请选择</option>
            <option value="supplier">供应商准入</option>
            <option value="contract">合同签订</option>
            <option value="price">价格审批</option>
            <option value="quality">质量检验</option>
            <option value="delivery">交付验收</option>
            <option value="payment">付款结算</option>
          </select>
        </div>
        <div class="form-item">
          <label>风险点<span class="req">*</span></label>
          <select>
            <option value="">请选择</option>
            <option value="qualification">资质异常</option>
            <option value="relation">关联关系</option>
            <option value="price">价格异常</option>
            <option value="quality">质量缺陷</option>
            <option value="delay">交付延期</option>
            <option value="contract">合同违约</option>
          </select>
        </div>
        <div class="form-item">
          <label>供应商名称<span class="req">*</span></label>
          <input type="text" placeholder="请输入供应商名称">
        </div>
        <div class="form-item">
          <label>统一社会信用代码</label>
          <input type="text" placeholder="请输入信用代码">
        </div>
        <div class="form-item">
          <label>风险等级<span class="req">*</span></label>
          <select>
            <option value="">请选择</option>
            <option value="high">高风险</option>
            <option value="mid">中风险</option>
            <option value="low">低风险</option>
          </select>
        </div>
        <div class="form-item">
          <label>关联单据号</label>
          <input type="text" placeholder="请输入关联单据号">
        </div>
        <div class="form-item span-2">
          <label>风险描述<span class="req">*</span></label>
          <textarea rows="3" placeholder="请描述风险情况..."></textarea>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn" data-action="close-modal" data-modal-target="addRiskModal">取消</button>
        <button class="btn btn-primary" data-action="save" data-modal-target="addRiskModal">保存</button>
      </div>
    </div>
  </div>

</div>

<script src="../../assets/page-runtime.js"></script>
<script>
(function() {
  var sceneData = [
    { id: 1, scene: '供应商准入', point: '资质异常', supplier: '广西铝业物资有限公司', creditCode: '91450100MA5KXXXXXX', level: 'high', rule: '资质有效期<30天', docNo: 'CG202412150001', time: '2024-12-15 10:30', status: 'pending' },
    { id: 2, scene: '合同签订', point: '关联关系', supplier: '南宁建材贸易有限公司', creditCode: '91450100MA5KYYYYYY', level: 'high', rule: '关联方未披露', docNo: 'HT202412100008', time: '2024-12-14 09:15', status: 'processing' },
    { id: 3, scene: '价格审批', point: '价格异常', supplier: '柳州金属材料有限公司', creditCode: '91450200MA5KZZZZZZ', level: 'mid', rule: '价格偏差>10%', docNo: 'JG202412120005', time: '2024-12-12 14:20', status: 'generated' },
    { id: 4, scene: '质量检验', point: '质量缺陷', supplier: '桂林化工原料厂', creditCode: '91450300MA5KAAAAAA', level: 'high', rule: '不合格率>5%', docNo: 'ZL202412110003', time: '2024-12-11 11:00', status: 'pending' },
    { id: 5, scene: '交付验收', point: '交付延期', supplier: '北海物流运输公司', creditCode: '91450500MA5KBBBBBB', level: 'mid', rule: '延期天数>7天', docNo: 'JH202412090002', time: '2024-12-09 16:45', status: 'false' },
    { id: 6, scene: '付款结算', point: '合同违约', supplier: '钦州矿业开发有限公司', creditCode: '91450700MA5KCCCCCC', level: 'low', rule: '违约金>5%', docNo: 'FK202412080001', time: '2024-12-08 08:30', status: 'closed' },
    { id: 7, scene: '供应商准入', point: '资质异常', supplier: '防城港进出口贸易公司', creditCode: '91450600MA5KDDDDDD', level: 'mid', rule: '资质有效期<60天', docNo: 'CG202412070004', time: '2024-12-07 13:20', status: 'pending' },
    { id: 8, scene: '合同签订', point: '价格异常', supplier: '贵港建材批发有限公司', creditCode: '91450800MA5KEEEEEE', level: 'low', rule: '价格偏差>5%', docNo: 'HT202412060006', time: '2024-12-06 10:00', status: 'processing' }
  ];

  var levelClass = { high: 'level-high', mid: 'level-mid', low: 'level-low' };
  var levelMap = { high: '高风险', mid: '中风险', low: '低风险' };
  var statusMap = { pending: '待处理', processing: '处理中', generated: '已生成任务', false: '已标记误报', closed: '已关闭' };
  var statusClass = { pending: 'pending', processing: 'review', generated: 'pass', false: 'draft', closed: 'pass' };

  var selectedIds = new Set();

  function renderTable() {
    var html = sceneData.map(function(r) {
      var checked = selectedIds.has(r.id) ? 'checked' : '';
      return '<tr>' +
        '<td><input type="checkbox" class="row-chk" data-id="' + r.id + '" ' + checked + '></td>' +
        '<td>' + r.id + '</td>' +
        '<td>' + r.scene + '</td>' +
        '<td>' + r.point + '</td>' +
        '<td class="text-left">' + r.supplier + '</td>' +
        '<td>' + r.creditCode + '</td>' +
        '<td><span class="level-tag ' + levelClass[r.level] + '">' + levelMap[r.level] + '</span></td>' +
        '<td><span class="type-tag type-rule">' + r.rule + '</span></td>' +
        '<td>' + r.docNo + '</td>' +
        '<td>' + r.time + '</td>' +
        '<td><span class="tag ' + statusClass[r.status] + '"><span class="td"></span>' + statusMap[r.status] + '</span></td>' +
        '<td>' +
          '<button class="op blue" data-action="generate-task" data-modal-target="taskConfirmModal">生成任务</button>' +
          '<button class="op blue" data-action="mark-false">误报</button>' +
        '</td>' +
      '</tr>';
    }).join('');
    document.getElementById('sceneTableBody').innerHTML = html;
    bindRowChecks();
  }

  function bindRowChecks() {
    document.querySelectorAll('.row-chk').forEach(function(chk) {
      chk.addEventListener('change', function() {
        var id = parseInt(this.dataset.id);
        if (this.checked) selectedIds.add(id);
        else selectedIds.delete(id);
        updateBatchBar();
      });
    });
  }

  function updateBatchBar() {
    var count = selectedIds.size;
    document.getElementById('selCount').textContent = count;
    var listCard = document.querySelector('.list-card');
    if (count > 0) listCard.classList.add('has-sel');
    else listCard.classList.remove('has-sel');
  }

  document.getElementById('chkAll').addEventListener('change', function() {
    if (this.checked) {
      sceneData.forEach(function(r) { selectedIds.add(r.id); });
    } else {
      selectedIds.clear();
    }
    renderTable();
    updateBatchBar();
  });

  PR.on('search', function() { PR.toast('查询完成'); renderTable(); });
  PR.on('reset', function() {
    document.getElementById('qScene').value = '';
    document.getElementById('qRiskPoint').value = '';
    document.getElementById('qLevel').value = '';
    document.getElementById('qHandleStatus').value = '';
    document.getElementById('qSupplier').value = '';
    document.getElementById('qDateFrom').value = '';
    document.getElementById('qDateTo').value = '';
    document.getElementById('qDocNo').value = '';
    document.getElementById('qCreditCode').value = '';
    selectedIds.clear();
    updateBatchBar();
    renderTable();
    PR.toast('已重置');
  });
  PR.on('batch-generate', function() { PR.toast('批量生成任务'); });
  PR.on('batch-export', function() { PR.toast('批量导出'); });
  PR.on('batch-generate-sel', function() { PR.toast('已选 ' + selectedIds.size + ' 项，批量生成任务'); });
  PR.on('batch-export-sel', function() { PR.toast('已选 ' + selectedIds.size + ' 项，批量导出'); });
  PR.on('generate-task', function() { PR.toast('生成监督任务'); });
  PR.on('mark-false', function() { PR.toast('标记误报'); });

  renderTable();
  PR.bindActions();
})();
</script>
</body>
</html>
