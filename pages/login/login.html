  <style>/* XinPlat Global Theme Variables
 * Version: 1.1.0
 *
 * Defines the 6 core themes:
 * 1. modern-light  (Modern Enterprise Light Mode)
 * 2. high-contrast (High-Contrast Accessibility)
 * 3. cyber-tech    (Cyber-Tech / Command Center)
 * 4. neutral-grey  (Neutral / Minimalist Grey)
 * 5. premium-dark  (Premium Enterprise Dark Mode)
 * 6. custom-brand  (Custom Brand Theming)
 *
 * Token Taxonomy:
 *   --color-primary / --color-primary-hover  : Brand / interactive
 *   --bg-app / --bg-surface / --bg-overlay   : Elevation layers (L0 / L1 / L2)
 *   --bg-elevated-1 / -2 / -3               : Additional elevation steps
 *   --text-primary / -secondary / -muted     : Content hierarchy
 *   --border-default / --border-subtle       : Chrome separators
 *   --color-success / -warning / -danger     : Status semantics
 *   --color-success-bg / -warning-bg / …    : Tinted status backgrounds
 *   --shadow-card / --shadow-modal           : Elevation shadows
 *   --glass-bg / --glow-accent               : Atmospheric FX
 *   --font-sans / --font-mono                : Typography stacks
 *   --auth-bg-image                          : Auth page wallpaper
 *
 * Z-Index Tokens (layout):
 *   --z-content / --z-sidebar / --z-topbar
 *   --z-modal / --z-fab / --z-copilot / --z-toast
 */

/* ──────────────────────────────────────────────
   0. GLOBAL LAYOUT Z-INDEX TOKENS
   These are theme-independent and always apply.
   ────────────────────────────────────────────── */
:root {
  --z-content: 0;
  --z-sidebar: 1030;
  --z-topbar: 1040;
  --z-modal: 1050;
  --z-fab: 1055;
  --z-copilot: 1056;
  --z-toast: 1080;
}

/* ──────────────────────────────────────────────
   0. GLOBAL TYPOGRAPHY TOKENS
   Theme-independent font stacks.
   ────────────────────────────────────────────── */
:root {
  --font-sans: "Inter", "PingFang SC", "Microsoft YaHei", -apple-system,
    BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
  --font-mono: "JetBrains Mono", "Roboto Mono", "SFMono-Regular", Consolas,
    "Liberation Mono", Menlo, monospace;
}

/* ──────────────────────────────────────────────
   1. BASE / FALLBACK  (modern-light defaults)
   ────────────────────────────────────────────── */
:root {
  /* Brand */
  --color-primary: #1890ff;
  --color-primary-hover: #40a9ff;
  --color-primary-active: #096dd9;
  --color-primary-subtle: rgba(24, 144, 255, 0.1);

  /* Elevation Backgrounds */
  --bg-app: #f9fafb;
  --bg-surface: #ffffff;
  --bg-overlay: #ffffff;
  --bg-elevated-1: #f3f4f6;
  --bg-elevated-2: #e5e7eb;
  --bg-elevated-3: #d1d5db;

  /* Typography */
  --text-primary: #111827;
  --text-secondary: #4b5563;
  --text-muted: #9ca3af;
  --text-on-primary: #ffffff;

  /* Borders */
  --border-default: #e5e7eb;
  --border-subtle: #f3f4f6;
  --border-strong: #d1d5db;

  /* Status — Success (Emerald) */
  --color-success: #10b981;
  --color-success-hover: #059669;
  --color-success-bg: rgba(16, 185, 129, 0.1);
  --color-success-border: rgba(16, 185, 129, 0.3);

  /* Status — Warning (Amber) */
  --color-warning: #f59e0b;
  --color-warning-hover: #d97706;
  --color-warning-bg: rgba(245, 158, 11, 0.1);
  --color-warning-border: rgba(245, 158, 11, 0.3);

  /* Status — Danger (Crimson) */
  --color-danger: #dc2626;
  --color-danger-hover: #b91c1c;
  --color-danger-bg: rgba(220, 38, 38, 0.1);
  --color-danger-border: rgba(220, 38, 38, 0.3);

  /* FX */
  --shadow-card: 0 4px 6px -1px rgba(0, 0, 0, 0.05),
    0 2px 4px -1px rgba(0, 0, 0, 0.03);
  --shadow-modal: 0 20px 60px -10px rgba(0, 0, 0, 0.15);
  --glass-bg: rgba(255, 255, 255, 0.85);
  --glow-accent: none;
  --fx-orb-1: rgba(0, 0, 0, 0);
  --fx-orb-2: rgba(0, 0, 0, 0);
  --fx-orb-3: rgba(0, 0, 0, 0);
  --fx-orb-blur: 64px;
  --fx-glass-blur: 16px;
  --fx-orb-blur: 0px;
  --fx-glass-blur: 0px;

  /* Auth */
  --auth-bg-image: url("../images/enterprise-bg.png");

  backdrop-filter: none;
}

/* ══════════════════════════════════════════════
   THEME 1 — Modern Enterprise Light Mode
   ══════════════════════════════════════════════ */
:root[data-theme="modern-light"] {
  --color-primary: #1890ff;
  --color-primary-hover: #40a9ff;

  --bg-elevated-3: #d1d5db;

  --text-primary: #111827;
  --text-secondary: #4b5563;
  --text-muted: #9ca3af;
  --text-on-primary: #ffffff;

  --border-default: #e5e7eb;
  --border-subtle: #f3f4f6;
  --border-strong: #d1d5db;

  --color-success: #10b981;
  --color-success-hover: #059669;

  --color-success-border: rgba(16, 185, 129, 0.3);

  --glass-bg: rgba(255, 255, 255, 0.85);

  --fx-orb-1: rgba(24, 144, 255, 0.10);
  --fx-orb-2: rgba(24, 144, 255, 0.06);

/* ══════════════════════════════════════════════

/* ══════════════════════════════════════════════

/* ══════════════════════════════════════════════
   THEME 5 — Premium Enterprise Dark Mode
   ──────────────────────────────────────────────
   Core philosophy: Elevation via colour layers,
   NOT flat black. Each surface step adds ~6-8%
   lightness to the base #0b0f1a.
   Brand blue #135bec as the sole accent.
   ══════════════════════════════════════════════ */
:root[data-theme="premium-dark"] {
  /* ── Brand ── */
  --color-primary: #135bec; /* XinPlat Brand Blue */
  --color-primary-hover: #3b76f0; /* +15% lighter */
  --color-primary-active: #0e47c0; /* -10% darker, pressed state */
  --color-primary-subtle: rgba(
    19,
    91,
    236,
    0.12
  ); /* Tinted bg for selected rows */

  /* ── Elevation Backgrounds (L0→L4) ──
     Each layer is ~6-8 lightness steps above the previous.
     Avoids pure black to maintain depth perception. */
  --bg-app: #0b0f1a; /* L0 — Page canvas (deepest) */
  --bg-surface: #161b2c; /* L1 — Cards, Sidebar, Top Bar */
  --bg-overlay: #1e2438; /* L2 — Popovers, tooltips */
  --bg-elevated-1: #232a3e; /* L3 — Active menu items, hover rows */
  --bg-elevated-2: #2a3350; /* L4 — Focus rings, drag-over */
  --bg-elevated-3: #334068; /* L5 — Accent badges, highlighted cells */

  /* ── Typography ── */
  --text-primary: rgba(255, 255, 255, 1); /* Headlines, labels */
  --text-secondary: rgba(255, 255, 255, 0.7); /* Body copy, descriptions */
  --text-muted: rgba(255, 255, 255, 0.4); /* Placeholders, disabled */
  --text-on-primary: #ffffff; /* White on brand-blue buttons */

  /* ── Borders ── */
  --border-default: rgba(255, 255, 255, 0.08); /* Subtle dividers */
  --border-subtle: rgba(255, 255, 255, 0.04); /* Near-invisible separators */
  --border-strong: rgba(255, 255, 255, 0.18); /* Focussed/selected rings */

  /* ── Status — Success (Emerald) ──
     Active sessions, completed tasks, healthy metrics */
  --color-success: #10b981; /* Emerald 500 */
  --color-success-hover: #34d399; /* Emerald 400 */
  --color-success-bg: rgba(16, 185, 129, 0.12);
  --color-success-border: rgba(16, 185, 129, 0.35);

  /* ── Status — Warning (Amber) ──
     Pending access requests, latency alerts, expiring certs */
  --color-warning: #f59e0b; /* Amber 400 */
  --color-warning-hover: #fbbf24; /* Amber 300 */
  --color-warning-bg: rgba(245, 158, 11, 0.12);
  --color-warning-border: rgba(245, 158, 11, 0.35);

  /* ── Status — Danger (Crimson) ──
     Delete / Suspend / High-risk operations */
  --color-danger: #ef4444; /* Red 500 */
  --color-danger-hover: #f87171; /* Red 400 */
  --color-danger-bg: rgba(239, 68, 68, 0.12);
  --color-danger-border: rgba(239, 68, 68, 0.35);

  /* ── Shadows (Elevation-driven, not colour-driven) ── */
  --shadow-card: 0 4px 16px rgba(0, 0, 0, 0.4), 0 1px 4px rgba(0, 0, 0, 0.25);
  --shadow-modal: 0 25px 80px rgba(0, 0, 0, 0.65), 0 8px 24px rgba(0, 0, 0, 0.4);

  /* ── Atmospheric FX ── */
  --glass-bg: rgba(22, 27, 44, 0.85);
  --glow-accent: 0 0 24px rgba(19, 91, 236, 0.2),
    0 0 8px rgba(19, 91, 236, 0.12);
  --fx-orb-1: rgba(19, 91, 236, 0.10);
  --fx-orb-2: rgba(59, 118, 240, 0.06);
  --fx-orb-3: rgba(16, 185, 129, 0.04);
  --fx-orb-blur: 80px;
  --fx-glass-blur: 16px;

  /* ── Auth page ── */
  --auth-bg-image: url("../images/premium-dark-bg.png");
}

/* ══════════════════════════════════════════════
   THEME 6 — Custom Brand Theming
   All tokens fall back to modern-light defaults;
   overrides are dynamically injected at runtime.
   ══════════════════════════════════════════════ */
:root[data-theme="custom-brand"] {
  --color-primary: var(--brand-primary, #1890ff);
  --color-primary-hover: var(--brand-primary-hover, #40a9ff);
  --color-primary-active: var(--brand-primary-active, #096dd9);
  --color-primary-subtle: var(--brand-primary-subtle, rgba(24, 144, 255, 0.1));

  --bg-app: var(--brand-bg-app, #f9fafb);
  --bg-surface: var(--brand-bg-surface, #ffffff);
  --bg-overlay: var(--brand-bg-overlay, #ffffff);
  --bg-elevated-1: var(--brand-bg-elevated-1, #f3f4f6);
  --bg-elevated-2: var(--brand-bg-elevated-2, #e5e7eb);
  --bg-elevated-3: var(--brand-bg-elevated-3, #d1d5db);

  --text-primary: var(--brand-text-primary, #111827);
  --text-secondary: var(--brand-text-secondary, #4b5563);
  --text-muted: var(--brand-text-muted, #9ca3af);
  --text-on-primary: var(--brand-text-on-primary, #ffffff);

  --border-default: var(--brand-border-default, #e5e7eb);

  <style>/* XinPlat Design System - Split Layout for Auth Pages
 * Professional split-screen layout with brand visual on left, form on right
 */

.auth-split-layout {
  display: grid;
  grid-template-columns: 1fr 1fr;
  min-height: 100vh;
  overflow: hidden;
}

/* Left Side - Brand Visual */
.auth-brand-side {
  position: relative;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  padding: var(--space-12);
  background-color: var(--bg-surface);
  background-image: var(--auth-bg-image);
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
  transition: background-image var(--transition-slow);
}

.auth-brand-overlay {
  position: absolute;
  inset: 0;
  background: var(--bg-overlay);
  opacity: 0.35;
}

.auth-brand-content {
  position: relative;
  z-index: 1;
  max-width: 480px;
  color: var(--text-on-primary);
}

.auth-brand-logo {
  max-width: 180px;
  margin-bottom: var(--space-8);
}

.auth-brand-title {
  font-size: var(--text-4xl);
  font-weight: 700;
  margin-bottom: var(--space-4);
  line-height: 1.2;
}

.auth-brand-description {
  font-size: var(--text-lg);
  opacity: 0.95;
  line-height: 1.6;
}

/* Right Side - Form Area */
.auth-form-side {
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: var(--space-12);
  background: var(--bg-app);
  overflow-y: auto;
}

.auth-form-container {
  width: 100%;
  max-width: 420px;
  margin: 0 auto;
  display: flex;
  flex-direction: column;
  min-height: 100vh;
  justify-content: center;
  padding: var(--space-8) 0;
}

.auth-form-header {
  text-align: center;
  margin-bottom: var(--space-8);
}

.auth-form-title {
  font-size: var(--text-3xl);
  font-weight: 600;
  color: var(--text-primary);
  margin-bottom: var(--space-2);
}

.auth-form-subtitle {
  font-size: var(--text-base);
  color: var(--text-secondary);
}

.auth-form-footer {
  margin-top: auto;
  padding-top: var(--space-8);
}

/* Responsive Design */
@media (max-width: 1024px) {
  .auth-split-layout {
    grid-template-columns: 1fr;
  }

  .auth-brand-side {
    display: none;
    /* Hide brand visual on smaller screens */
  }

  .auth-form-side {
    padding: var(--space-6);
  }

  .auth-form-container {
    padding: var(--space-6) 0;
  }
}

@media (max-width: 640px) {
  .auth-form-side {
    padding: var(--space-4);
  }

  .auth-form-container {
    padding: var(--space-4) 0;
  }

  .auth-form-title {
    font-size: var(--text-2xl);
  }
}
</style>
