<!DOCTYPE html>
<!--
  规格卡（转 Vue 的唯一真源）
  编码：FXLSC01    名称：风险驾驶舱    类型：数据看板页
  统计卡片：待处理风险数 / 已处置风险数 / 超期风险数 / 同比趋势（联动 filter.status）
  图表：风险趋势折线图（近12个月） / 风险类型分布饼图
  底部：风险列表（等级标签高/中/低 + 查看详情/去处置操作按钮）
  列表上方：状态页签（全部/待处理/已处置）带数字徽章
-->
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../../assets/app.css">
<title>风险驾驶舱</title>
</head>
<body class="page-body">

<div id="page-content" data-page="FXLSC01" class="prototype-page">

  <!-- 页头 -->
  <div class="page-header">
    <div class="page-title">风险驾驶舱</div>
    <div class="page-sub">数据更新时间：2024-12-20 14:30</div>
  </div>

  <!-- 统计卡片行 -->
  <div class="stat-row prototype-stat-row" id="statRow">
    <!-- 待处理风险数 -->
    <div class="stat-card rich prototype-stat-card" data-status="pending">
      <div class="ico ico-blue">⚠</div>
      <div class="stat-info">
        <div class="num" id="numPending">42</div>
        <div class="label">待处理风险数</div>
        <span class="trend trend-up">↑ 较上月 +3</span>
      </div>
    </div>
    <!-- 已处置风险数 -->
    <div class="stat-card rich prototype-stat-card" data-status="resolved">
      <div class="ico ico-green">✓</div>
      <div class="stat-info">
        <div class="num num-success" id="numResolved">109</div>
        <div class="label">已处置风险数</div>
        <span class="trend trend-down">↓ 较上月 +18</span>
      </div>
    </div>
    <!-- 超期风险数 -->
    <div class="stat-card rich prototype-stat-card" data-status="overdue">
      <div class="ico ico-red">!</div>
      <div class="stat-info">
        <div class="num num-danger" id="numOverdue">5</div>
        <div class="label">超期风险数</div>
        <span class="trend trend-up">↑ 较上月 +2</span>
      </div>
    </div>
    <!-- 同比趋势 -->
    <div class="stat-card rich prototype-stat-card" data-status="trend">
      <div class="ico ico-orange">↗</div>
      <div class="stat-info">
        <div class="num num-orange" id="numTrend">12.5%</div>
        <div class="label">同比趋势</div>
        <span class="trend trend-up">↑ 较去年 +2.3%</span>
      </div>
    </div>
  </div>

  <!-- 图表区：2/3 折线图 + 1/3 饼图 -->
  <div class="dash-grid-21">
    <!-- 风险趋势折线图 -->
    <div class="card prototype-card">
      <div class="card-head prototype-card-head">
        <div class="title prototype-title"><span class="bar"></span>风险趋势（近12个月）</div>
      </div>
      <div class="chart-wrap prototype-chart-wrap" id="trendChart"></div>
    </div>
    <!-- 风险类型分布饼图 -->
    <div class="card prototype-card">
      <div class="card-head prototype-card-head">
        <div class="title prototype-title"><span class="bar"></span>风险类型分布</div>
      </div>
      <div class="chart-wrap prototype-chart-wrap" id="pieChart"></div>
    </div>
  </div>

  <!-- 风险列表 -->
  <div class="card prototype-card list-card">
    <div class="card-head prototype-card-head">
      <div class="title prototype-title"><span class="bar"></span>风险列表</div>
    </div>
    <!-- 状态页签 + 数字徽章 -->
    <div class="status-tabs prototype-status-tabs" id="statusTabs">
      <span class="status-tab prototype-status-tab active" data-tab="all">全部<span class="st-count">156</span></span>
      <span class="status-tab prototype-status-tab" data-tab="pending">待处理<span class="st-count">42</span></span>
      <span class="status-tab prototype-status-tab" data-tab="resolved">已处置<span class="st-count">114</span></span>
    </div>
    <!-- 表格 -->
    <div class="table-wrap prototype-table-wrap">
      <table>
        <thead>
          <tr>
            <th style="width:200px;">风险名称</th>
            <th style="width:90px;">风险等级</th>
            <th style="width:110px;">风险类型</th>
            <th style="width:110px;">来源系统</th>
            <th style="width:110px;">创建时间</th>
            <th style="width:90px;">负责人</th>
            <th style="width:160px;">操作</th>
          </tr>
        </thead>
        <tbody id="riskBody"></tbody>
      </table>
    </div>
    <!-- 分页 -->
    <div class="pager">
      <span class="total">共 <b id="pagerTotal">156</b> 条</span>
      <span class="pg-size">10条/页</span>
      <span class="pg active">1</span><span class="pg">2</span><span class="pg">3</span><span class="pg">…</span><span class="pg">16</span>
      <span class="goto">前往<input value="1" type="text">页</span>
    </div>
  </div>

</div><!-- /#page-content -->

<script src="../../assets/page-runtime.js"></script>
<script>
/* ====== 趋势折线图数据（近12个月） ====== */
var TREND = [
  { month:'1月', val:12 },
  { month:'2月', val:15 },
  { month:'3月', val:18 },
  { month:'4月', val:14 },
  { month:'5月', val:22 },
  { month:'6月', val:19 },
  { month:'7月', val:25 },
  { month:'8月', val:21 },
  { month:'9月', val:28 },
  { month:'10月',val:24 },
  { month:'11月',val:30 },
  { month:'12月',val:26 }
];

/* ====== 风险类型分布数据 ====== */
var PIE_PARTS = [
  { label:'合规风险',   pct:35, color:'#1565c0' },
  { label:'操作风险',   pct:25, color:'#fb8c00' },
  { label:'信用风险',   pct:18, color:'#e53935' },
  { label:'市场风险',   pct:15, color:'#5e35b1' },
  { label:'流动性风险', pct:7,  color:'#43a047' }
];

/* ====== 风险列表数据 ====== */
var RISK_DATA = [
  { name:'供应商信用风险预警',       level:'高', type:'合规风险',  source:'ERP系统',  date:'2024-11-15', person:'张建国', status:'pending'  },
  { name:'市场价格异常波动监控',     level:'高', type:'市场风险',  source:'交易系统',  date:'2024-11-20', person:'李晓明', status:'pending'  },
  { name:'合同条款合规性审查缺失',   level:'中', type:'合规风险',  source:'合同系统',  date:'2024-11-25', person:'王丽华', status:'pending'  },
  { name:'物流运输中断风险',         level:'中', type:'操作风险',  source:'物流系统',  date:'2024-12-01', person:'赵志强', status:'pending'  },
  { name:'大宗原材料价格暴跌',       level:'高', type:'市场风险',  source:'交易系统',  date:'2024-12-03', person:'刘婷婷', status:'pending'  },
  { name:'供应商资质过期未更新',     level:'中', type:'操作风险',  source:'SRM系统',   date:'2024-12-05', person:'陈伟明', status:'resolved' },
  { name:'银行贷款利率上调影响',     level:'低', type:'流动性风险',source:'财务系统',  date:'2024-12-08', person:'周建华', status:'resolved' },
  { name:'新环保法规合规差距分析',   level:'中', type:'合规风险',  source:'法务系统',  date:'2024-12-10', person:'吴雪梅', status:'resolved' },
  { name:'客户信用评级下调',         level:'低', type:'信用风险',  source:'CRM系统',   date:'2024-12-12', person:'黄志远', status:'resolved' },
  { name:'外汇汇率波动超阈值',       level:'低', type:'市场风险',  source:'财务系统',  date:'2024-12-15', person:'孙丽娜', status:'resolved' }
];

/* ====== 等级映射 ====== */
var LEVEL_MAP = {
  '高': { cls:'level-high', text:'高' },
  '中': { cls:'level-mid',  text:'中' },
  '低': { cls:'level-low',  text:'低' }
};

/* ====== 当前筛选状态 ====== */
var currentTab = 'all';

/* ====== 渲染折线图（SVG polyline） ====== */
function renderTrend() {
  var el = document.getElementById('trendChart');
  if (!el) return;
  var W = 620, H = 200, padL = 36, padR = 12, padT = 10, padB = 28;
  var maxVal = Math.max.apply(null, TREND.map(function(t){ return t.val; }));
  var yMax = Math.ceil(maxVal / 5) * 5 + 5;
  var xStep = (W - padL - padR) / (TREND.length - 1);
  var yScale = (H - padT - padB) / yMax;

  var points = TREND.map(function(t, i){
    var x = padL + i * xStep;
    var y = H - padB - t.val * yScale;
    return x + ',' + y;
  }).join(' ');

  var yGrid = [];
  for (var v = 0; v <= yMax; v += 5) {
    yGrid.push(v);
  }

  var areaPoints = padL + ',' + (H - padB) + ' ' + points + ' ' + (padL + (TREND.length - 1) * xStep) + ',' + (H - padB);

  el.innerHTML =
    '<svg width="100%" height="220" viewBox="0 0 ' + W + ' 220" style="display:block;">' +
    /* Y轴网格线 */
    yGrid.map(function(v){
      var y = H - padB - v * yScale;
      return '<line x1="' + padL + '" y1="' + y + '" x2="' + (W - padR) + '" y2="' + y + '" stroke="#f0f0f0" stroke-width="1"/>' +
        '<text x="' + (padL - 4) + '" y="' + (y + 3) + '" text-anchor="end" font-size="10" fill="#999">' + v + '</text>';
    }).join('') +
    /* 面积填充 */
    '<polygon points="' + areaPoints + '" fill="#1565c0" opacity="0.06"/>' +
    /* 折线 */
    '<polyline points="' + points + '" fill="none" stroke="#1565c0" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>' +
    /* 数据点 */
    TREND.map(function(t, i){
      var x = padL + i * xStep;
      var y = H - padB - t.val * yScale;
      return '<circle cx="' + x + '" cy="' + y + '" r="3" fill="#fff" stroke="#1565c0" stroke-width="2"/><text x="' + x + '" y="' + (y - 8) + '" text-anchor="middle" font-size="10" fill="#333">' + t.val + '</text>';
    }).join('') +
    /* X轴标签 */
    TREND.map(function(t, i){
      var x = padL + i * xStep;
      return '<text x="' + x + '" y="' + (H + 4) + '" text-anchor="middle" font-size="11" fill="#999">' + t.month + '</text>';
    }).join('') +
    '</svg>';
}

/* ====== 渲染饼图 ====== */
function renderPie() {
  var el = document.getElementById('pieChart');
  if (!el) return;
  var total = PIE_PARTS.reduce(function(s, p){ return s + p.pct; }, 0);
  var grad = PIE_PARTS.map(function(p, i){
    var start = PIE_PARTS.slice(0, i).reduce(function(s, x){ return s + x.pct; }, 0);
    return p.color + ' ' + start + '% ' + (start + p.pct) + '%';
  }).join(',');
  el.innerHTML =
    '<div class="pie-wrap">' +
    '<div class="pie" style="background:conic-gradient(' + grad + ');">' +
    '<div class="pie-hole">' + total + '%</div></div>' +
    '<div class="pie-legend">' +
    PIE_PARTS.map(function(p){
      return '<div class="pie-legend-item"><span class="pie-legend-dot" style="background:' + p.color + ';"></span><span>' + p.label + ' ' + p.pct + '%</span></div>';
    }).join('') +
    '</div></div>';
}

/* ====== 渲染风险列表 ====== */
function renderRiskTable() {
  var el = document.getElementById('riskBody');
  if (!el) return;
  var filtered = currentTab === 'all' ? RISK_DATA : RISK_DATA.filter(function(r){ return r.status === currentTab; });
  document.getElementById('pagerTotal').textContent = filtered.length;
  el.innerHTML = filtered.map(function(r){
    var lv = LEVEL_MAP[r.level];
    return '<tr>' +
      '<td class="text-left"><span class="link" data-nav="FXLSC01-DETAIL">' + r.name + '</span></td>' +
      '<td><span class="level-tag ' + lv.cls + '">' + lv.text + '</span></td>' +
      '<td>' + r.type + '</td>' +
      '<td>' + r.source + '</td>' +
      '<td>' + r.date + '</td>' +
      '<td>' + r.person + '</td>' +
      '<td><div class="op-btns">' +
        '<button class="btn btn-sm" data-action="open-view">查看详情</button>' +
        '<button class="btn btn-sm btn-primary" data-action="go-handle">去处置</button>' +
      '</div></td></tr>';
  }).join('');
  PR.bindActions();
}

/* ====== 状态页签切换 ====== */
function initTabs() {
  var tabs = document.querySelectorAll('#statusTabs .status-tab');
  tabs.forEach(function(tab){
    tab.addEventListener('click', function(){
      tabs.forEach(function(t){ t.classList.remove('active'); });
      tab.classList.add('active');
      currentTab = tab.getAttribute('data-tab');
      renderRiskTable();
    });
  });
}

/* ====== 统计卡片点击联动筛选 ====== */
function initStatCards() {
  var cards = document.querySelectorAll('#statRow .stat-card');
  cards.forEach(function(card){
    card.addEventListener('click', function(){
      cards.forEach(function(c){ c.classList.remove('active'); });
      card.classList.add('active');
      var st = card.getAttribute('data-status');
      if (st === 'trend') { currentTab = 'all'; }
      else if (st === 'overdue') { currentTab = 'pending'; }
      else if (st === 'pending') { currentTab = 'pending'; }
      else if (st === 'resolved') { currentTab = 'resolved'; }
      else { currentTab = 'all'; }
      var tabs = document.querySelectorAll('#statusTabs .status-tab');
      tabs.forEach(function(t){
        t.classList.remove('active');
        if (t.getAttribute('data-tab') === currentTab) t.classList.add('active');
      });
      renderRiskTable();
    });
  });
}

/* ====== 主渲染 ====== */
function render() {
  renderTrend();
  renderPie();
  renderRiskTable();
  initTabs();
  initStatCards();
}

render();
</script>
</body>
</html>
