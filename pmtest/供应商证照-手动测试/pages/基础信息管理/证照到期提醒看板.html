<!DOCTYPE html>
<!--
  编码：BMSP02-ALERT    名称：证照到期提醒看板    类型：数据看板/列表页
  用途：汇总即将到期 / 已过期的证照，方便提前催办续期
  内容：预警统计卡片 + 到期证照列表 + 导出预警清单
  样例数据：覆盖 30 天内到期、90 天内到期、已过期三种预警级别。
-->
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../../assets/app.css">
<title>证照到期提醒看板</title>
</head>
<body class="page-body">

<div id="page-content" data-page="BMSP02-ALERT" class="prototype-page">

  <!-- 预警统计卡片 -->
  <div class="stat-row prototype-stat-row" id="statRow">
    <div class="stat-card prototype-stat-card active" data-status="all">
      <div class="label">全部预警</div><div class="num" id="cnt-all">0</div>
    </div>
    <div class="stat-card prototype-stat-card" data-status="danger30">
      <div class="label"><span class="dot" style="background:#e53935"></span>30 天内到期</div><div class="num" id="cnt-danger30">0</div>
    </div>
    <div class="stat-card prototype-stat-card" data-status="warning90">
      <div class="label"><span class="dot" style="background:#fb8c00"></span>31-90 天到期</div><div class="num" id="cnt-warning90">0</div>
    </div>
    <div class="stat-card prototype-stat-card" data-status="expired">
      <div class="label"><span class="dot" style="background:#c62828"></span>已过期</div><div class="num" id="cnt-expired">0</div>
    </div>
  </div>

  <!-- 查询区 -->
  <div class="card prototype-card">
    <div class="card-head prototype-card-head">
      <div class="title prototype-title"><span class="bar"></span>筛选条件</div>
      <div class="actions prototype-actions">
        <button class="btn" data-action="reset">重置</button>
        <button class="btn btn-primary" data-action="search">查询</button>
      </div>
    </div>
    <div class="query-grid prototype-query-grid">
      <div class="form-item prototype-field">
        <label>供应商名称</label>
        <input type="text" id="q-name" placeholder="请输入供应商名称">
      </div>
      <div class="form-item prototype-field">
        <label>证照类型</label>
        <select id="q-type">
          <option value="">全部</option>
          <option value="营业执照">营业执照</option>
          <option value="危废经营许可证">危废经营许可证</option>
          <option value="道路运输许可证">道路运输许可证</option>
          <option value="安全生产许可证">安全生产许可证</option>
        </select>
      </div>
    </div>
  </div>

  <!-- 到期证照列表 -->
  <div class="card list-card prototype-card prototype-list-card" id="listCard">
    <div class="list-toolbar prototype-list-toolbar">
      <div class="title prototype-title">到期预警清单</div>
      <div class="actions prototype-actions">
        <button class="btn btn-sm" data-action="batch-export">导出预警清单</button>
      </div>
    </div>

    <div class="status-tabs prototype-status-tabs" id="statusTabs">
      <div class="prototype-status-tab active" data-status="all">全部预警</div>
      <div class="prototype-status-tab" data-status="danger30">30 天内到期</div>
      <div class="prototype-status-tab" data-status="warning90">31-90 天到期</div>
      <div class="prototype-status-tab" data-status="expired">已过期</div>
    </div>

    <div class="table-wrap prototype-table-wrap">
      <table class="prototype-table">
        <thead>
          <tr>
            <th style="width:50px">序号</th>
            <th>供应商</th>
            <th>证照类型</th>
            <th>证号</th>
            <th style="width:110px">有效期</th>
            <th style="width:100px">剩余天数</th>
            <th style="width:90px">状态</th>
            <th style="width:130px">操作</th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
    <div class="pager">
      <span class="total">共 <b id="total">0</b> 条</span>
      <span class="pg active">1</span><span class="pg">›</span>
    </div>
  </div>

</div>

<script src="../../assets/page-runtime.js"></script>
<script>
/* ================= 数据 ================= */
const TODAY = '2026-06-26';
const STATUS_MAP = {
  danger30:  { cls: 'reject', text: '30天内到期' },
  warning90: { cls: 'pending', text: '31-90天到期' },
  expired:   { cls: 'reject',  text: '已过期' }
};
let DATA = [
  { id:1, supplier:'广西铝业科技有限公司', type:'道路运输许可证',      no:'桂交运管许可南字12345号', expire:'2026-07-05' },
  { id:2, supplier:'北海宏泰化工原料有限公司', type:'安全生产许可证',  no:'（桂）FM安许证字〔2024〕0112', expire:'2026-06-10' },
  { id:3, supplier:'桂林绿能环保科技有限公司', type:'危废经营许可证',  no:'GXWF2023-0089', expire:'2026-05-01' },
  { id:4, supplier:'广西铝业科技有限公司', type:'危废经营许可证',      no:'GXWF2024-0012', expire:'2026-08-10' },
  { id:5, supplier:'柳州鑫源物流有限公司', type:'道路运输许可证',      no:'桂交运管许可柳字67890号', expire:'2025-12-20' },
  { id:6, supplier:'北海宏泰化工原料有限公司', type:'营业执照',        no:'91450500MA5R3XXXXX', expire:'2025-08-18' }
].map(d=>{ const r = computeRemain(d.expire); d.status = r.status; d.remain = r.days; return d; });

let curStatus = 'all';
let filterName = '';
let filterType = '';

function computeRemain(expire) {
  const t = new Date(TODAY), e = new Date(expire);
  const diff = Math.ceil((e - t) / (1000*60*60*24));
  if (diff < 0) return { status:'expired', days:diff };
  if (diff <= 30) return { status:'danger30', days:diff };
  if (diff <= 90) return { status:'warning90', days:diff };
  return { status:'normal', days:diff };
}

function filteredList() {
  return DATA.filter(d => {
    if (curStatus !== 'all' && d.status !== curStatus) return false;
    if (filterName && !d.supplier.includes(filterName)) return false;
    if (filterType && d.type !== filterType) return false;
    return true;
  });
}

function updateCounts() {
  document.getElementById('cnt-all').textContent = DATA.length;
  document.getElementById('cnt-danger30').textContent = DATA.filter(d => d.status === 'danger30').length;
  document.getElementById('cnt-warning90').textContent = DATA.filter(d => d.status === 'warning90').length;
  document.getElementById('cnt-expired').textContent = DATA.filter(d => d.status === 'expired').length;
}

function render() {
  const list = filteredList();
  document.getElementById('total').textContent = list.length;
  document.getElementById('tbody').innerHTML = list.map((d, i) => {
    const st = STATUS_MAP[d.status];
    const remainText = d.status === 'expired' ? '已过期 ' + Math.abs(d.remain) + ' 天' : d.remain + ' 天';
    return `<tr>
      <td>${i + 1}</td>
      <td><span class="link" data-nav="BMSP02-DETAIL">${d.supplier}</span></td>
      <td>${d.type}</td>
      <td>${d.no}</td>
      <td>${d.expire}</td>
      <td>${remainText}</td>
      <td><span class="tag ${st.cls}">${st.text}</span></td>
      <td>
        <a class="op blue" data-action="view-scan" data-id="${d.id}">查看扫描件</a>
        <a class="op green" data-action="open-renew" data-id="${d.id}">登记续期</a>
      </td>
    </tr>`;
  }).join('') || '<tr><td colspan="8" style="text-align:center;color:#999">暂无预警数据</td></tr>';
  updateCounts();
  PR.bindActions();
}

function setStatus(s) {
  curStatus = s;
  document.querySelectorAll('#statRow .stat-card, #statusTabs .status-tab').forEach(t => {
    t.classList.toggle('active', t.dataset.status === s);
  });
  render();
}

/* ================= 动作注册 ================= */
PR.on('search', () => {
  filterName = document.getElementById('q-name').value.trim();
  filterType = document.getElementById('q-type').value;
  render();
});

PR.on('reset', () => {
  document.getElementById('q-name').value = '';
  document.getElementById('q-type').value = '';
  filterName = '';
  filterType = '';
  setStatus('all');
});

PR.on('batch-export', () => {
  PR.toast('已导出预警证照清单');
});

PR.on('view-scan', e => {
  const id = e.dataset.id;
  const d = DATA.find(x => x.id == id);
  PR.toast('查看「' + d.supplier + '」的 ' + d.type + ' 扫描件（占位）');
});

PR.on('open-renew', e => {
  const d = DATA.find(x => x.id == e.dataset.id);
  PR.toast('打开「' + d.supplier + ' - ' + d.type + '」续期登记（占位）');
});

/* ================= 事件绑定 ================= */
document.querySelectorAll('#statRow .stat-card, #statusTabs .status-tab').forEach(el => {
  el.addEventListener('click', () => setStatus(el.dataset.status));
});

render();
</script>
</body>
</html>
